services:
  db:
    image: postgres:16.6
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fifa26}
      # Без дефолта: compose упадёт, если пароль не задан в .env —
      # дефолтный пароль на VPS = открытая база.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?задайте POSTGRES_PASSWORD в .env}
      POSTGRES_DB: ${POSTGRES_DB:-fifa26}
    ports:
      # Только loopback: наружу порт БД не публикуем (бот ходит по compose-сети).
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fifa26}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Лимиты: на общем VPS бот+БД не должны голодать основной проект при наплыве.
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 256

  bot:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256

volumes:
  pgdata:
